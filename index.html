    } catch (e) {}

  <script>
  (function () {
    var canvas = document.getElementById('home-canvas');
    var ctx = canvas.getContext('2d');
    var stars = [];
    var raf = null;
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var PALETTE = ['#ffffff', '#ffffff', '#ffffff', '#fff9f0', '#edf1ff'];

    function resize() {
      var dpr = window.devicePixelRatio || 1;
      var w = window.innerWidth, h = window.innerHeight;
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      spawn(w, h);
    }

    function spawn(w, h) {
      var count = Math.max(160, Math.min(Math.floor(w * h / 3600), 420));
      stars = [];
      for (var i = 0; i < count; i++) {
        var roll = Math.random();
        var big = roll < 0.04, mid = roll < 0.38;
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: big  ? (1.1 + Math.random() * 0.9)
             : mid ? (0.6 + Math.random() * 0.55)
                   : (0.18 + Math.random() * 0.44),
          base: big  ? (0.70 + Math.random() * 0.25)
                : mid ? (0.40 + Math.random() * 0.28)
                      : (0.10 + Math.random() * 0.28),
          speed: 0.35 + Math.random() * 1.3,
          phase: Math.random() * 6.2832,
          color: PALETTE[Math.floor(Math.random() * PALETTE.length)]
        });
      }
    }

    function paint(ts) {
      var w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      var t = (ts || 0) * 0.001;
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var a = reduced
          ? s.base
          : s.base * (1 + 0.22 * Math.sin(t * s.speed + s.phase));
        ctx.globalAlpha = Math.max(0.02, Math.min(1, a));
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, 6.2832);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (!reduced) raf = requestAnimationFrame(paint);
    }

    function isDark() {
      return document.documentElement.getAttribute('data-theme') !== 'light';
    }

    function sync() {
      if (isDark()) {
        canvas.style.opacity = '1';
        if (!raf) {
          if (reduced) {
            paint(0);
          } else {
            raf = requestAnimationFrame(paint);
          }
        }
      } else {
        canvas.style.opacity = '0';
        if (raf) { cancelAnimationFrame(raf); raf = null; }
      }
    }

    new MutationObserver(sync).observe(
      document.documentElement,
      { attributes: true, attributeFilter: ['data-theme'] }
    );

    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      resizeTimer = setTimeout(function () { resize(); sync(); }, 60);
    });

    resize();
    sync();
  }());
  </script>
